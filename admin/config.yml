backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "images/uploads"
public_folder: "/images/uploads"


# ─── COLLECTIONS ─────────────────────────────────────────
collections:

  # ── 1. SITE SETTINGS ────────────────────────────────────
  - name: settings
    label: "Settings"
    files:

      - label: "Informations Générales"
        name: general
        file: "data/settings/general.json"
        fields:
          - { label: "Nom de la société",   name: company_name,  widget: string,  default: "KMC – Khelfa Metal Company" }
          - { label: "Slogan (FR)",          name: tagline_fr,    widget: string }
          - { label: "Slogan (EN)",          name: tagline_en,    widget: string }
          - { label: "Année de fondation",   name: founded,       widget: number,  default: 2012 }
          - { label: "Nb projets réalisés",  name: stat_projects, widget: number,  default: 500 }
          - { label: "Années d'expérience",  name: stat_years,    widget: number,  default: 12 }
          - { label: "Nb machines CNC",      name: stat_machines, widget: number,  default: 4 }

      - label: "Contact & Coordonnées"
        name: contact
        file: "data/settings/contact.json"
        fields:
          - { label: "Téléphone principal",  name: phone1,   widget: string, default: "+213 666 79 3553" }
          - { label: "Téléphone secondaire", name: phone2,   widget: string, default: "+213 774 85 3903" }
          - { label: "Email principal",       name: email1,   widget: string, default: "info@kmc-metal.dz" }
          - { label: "Email commercial",      name: email2,   widget: string }
          - { label: "Adresse",               name: address,  widget: text,   default: "Zone Industrielle, Sétif\nAlgérie — 19000" }
          - label: "Horaires"
            name: hours
            widget: list
            fields:
              - { label: "Jours",   name: days,  widget: string }
              - { label: "Heures",  name: hours, widget: string }

  # ── 2. MACHINES ─────────────────────────────────────────
  - name: machines
    label: "Machines"
    files:
      - label: "Liste des Machines"
        name: machines_list
        file: "data/machines.json"
        fields:
          - label: "Machines"
            name: items
            widget: list
            fields:
              - { label: "Ordre d'affichage", name: order,   widget: number }
              - { label: "Nom (FR)",          name: name_fr, widget: string }
              - { label: "Nom (EN)",          name: name_en, widget: string }
              - { label: "Badge / Label",     name: badge,   widget: string, hint: "Ex: Haute Précision, Pro Series" }
              - { label: "Description (FR)",  name: desc_fr, widget: text }
              - { label: "Description (EN)",  name: desc_en, widget: text }
              - { label: "Photo principale",  name: image,   widget: image }
              - label: "Spécifications Techniques"
                name: specs
                widget: list
                fields:
                  - { label: "Paramètre (FR)", name: key_fr, widget: string }
                  - { label: "Paramètre (EN)", name: key_en, widget: string }
                  - { label: "Valeur",         name: value,  widget: string }
              - label: "Matériaux compatibles"
                name: materials
                widget: list
                field: { label: "Matériau", name: item, widget: string }

  # ── 3. SERVICES ─────────────────────────────────────────
  - name: services
    label: "Services"
    files:
      - label: "Liste des Services"
        name: services_list
        file: "data/services.json"
        fields:
          - label: "Services"
            name: items
            widget: list
            fields:
              - { label: "Ordre",            name: order,   widget: number }
              - { label: "Icône",            name: icon,    widget: string, hint: "Ex: bolt fire tool ruler factory handshake" }
              - { label: "Nom (FR)",         name: name_fr, widget: string }
              - { label: "Nom (EN)",         name: name_en, widget: string }
              - { label: "Description (FR)", name: desc_fr, widget: text }
              - { label: "Description (EN)", name: desc_en, widget: text }
              - label: "Points clés"
                name: specs
                widget: list
                field: { label: "Point", name: item, widget: string }

  # ── 4. PORTFOLIO / RÉALISATIONS ─────────────────────────
  - name: portfolio
    label: "Portfolio"
    files:
      - label: "Liste des Réalisations"
        name: portfolio_list
        file: "data/portfolio.json"
        fields:
          - label: "Projets"
            name: items
            widget: list
            fields:
              - { label: "Titre (FR)",       name: title_fr, widget: string }
              - { label: "Titre (EN)",       name: title_en, widget: string }
              - label: "Catégorie"
                name: category
                widget: select
                options:
                  - { label: "Découpe Laser", value: laser }
                  - { label: "Soudure",       value: soudure }
                  - { label: "Pliage CNC",    value: pliage }
                  - { label: "Découpe Tube",  value: tube }
              - { label: "Photo",            name: image,    widget: image }
              - { label: "Description (FR)", name: desc_fr,  widget: text,    required: false }
              - { label: "Description (EN)", name: desc_en,  widget: text,    required: false }
              - { label: "Mise en avant",    name: featured, widget: boolean, default: false }

  # ── 5. TÉMOIGNAGES ──────────────────────────────────────
  - name: testimonials
    label: "Testimonials"
    files:
      - label: "Liste des Témoignages"
        name: testimonials_list
        file: "data/testimonials.json"
        fields:
          - label: "Témoignages"
            name: items
            widget: list
            fields:
              - { label: "Nom du client",   name: name,     widget: string }
              - { label: "Rôle / Poste",    name: role,     widget: string }
              - { label: "Entreprise",      name: company,  widget: string }
              - { label: "Témoignage (FR)", name: quote_fr, widget: text }
              - { label: "Témoignage (EN)", name: quote_en, widget: text,  required: false }
              - { label: "Avatar / Photo",  name: avatar,   widget: image, required: false }
              - { label: "Secteur",         name: sector,   widget: string, hint: "Ex: Automobile, BTP, Énergie" }

  # ── 6. HERO / PAGE D'ACCUEIL ─────────────────────────────
  - name: hero
    label: "Hero Section"
    files:
      - label: "Section Héro"
        name: hero_section
        file: "data/hero.json"
        fields:
          - { label: "Titre ligne 1 (FR)", name: line1_fr,    widget: string, default: "FAÇONNER" }
          - { label: "Titre ligne 2 (FR)", name: line2_fr,    widget: string, default: "L'ACIER" }
          - { label: "Titre ligne 3 (FR)", name: line3_fr,    widget: string, default: "DE DEMAIN" }
          - { label: "Titre ligne 1 (EN)", name: line1_en,    widget: string }
          - { label: "Titre ligne 2 (EN)", name: line2_en,    widget: string }
          - { label: "Titre ligne 3 (EN)", name: line3_en,    widget: string }
          - { label: "Sous-titre (FR)",    name: subtitle_fr, widget: text }
          - { label: "Sous-titre (EN)",    name: subtitle_en, widget: text }
          - { label: "Image héro",         name: image,       widget: image }

  # ── 7. À PROPOS ──────────────────────────────────────────
  - name: about
    label: "About"
    files:
      - label: "Section À Propos"
        name: about_section
        file: "data/about.json"
        fields:
          - { label: "Texte principal (FR)", name: text_fr, widget: markdown }
          - { label: "Texte principal (EN)", name: text_en, widget: markdown }
          - { label: "Photo atelier",        name: image,   widget: image }
          - label: "Piliers (Vision / Mission / Valeurs)"
            name: pillars
            widget: list
            fields:
              - { label: "Icône",        name: icon,    widget: string }
              - { label: "Titre (FR)",   name: name_fr, widget: string }
              - { label: "Titre (EN)",   name: name_en, widget: string }
              - { label: "Contenu (FR)", name: text_fr, widget: text }
              - { label: "Contenu (EN)", name: text_en, widget: text }
